<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Naming Word Rater</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #18202b;
        --muted: #596170;
        --line: #dce3ee;
        --paper: #fffdf8;
        --panel: #ffffff;
        --yes: #177245;
        --yes-bg: #def7e8;
        --maybe: #9a5b00;
        --maybe-bg: #fff0c9;
        --no: #a13434;
        --no-bg: #ffe1de;
        --blue: #2357d8;
        --shadow: 0 18px 45px rgba(31, 41, 55, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          linear-gradient(rgba(255, 253, 248, 0.92), rgba(255, 253, 248, 0.96)),
          radial-gradient(circle at 20% 0%, rgba(255, 214, 102, 0.5), transparent 32rem),
          radial-gradient(circle at 80% 10%, rgba(101, 163, 255, 0.34), transparent 36rem),
          #fffdf8;
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      header {
        padding: 44px clamp(18px, 4vw, 56px) 22px;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 22px;
        align-items: end;
        max-width: 1180px;
        margin: 0 auto;
      }

      h1 {
        margin: 0;
        max-width: 780px;
        font-size: clamp(2.2rem, 5vw, 5.4rem);
        line-height: 0.94;
        letter-spacing: 0;
      }

      .subhead {
        margin: 18px 0 0;
        max-width: 730px;
        color: var(--muted);
        font-size: clamp(1rem, 1.6vw, 1.2rem);
        line-height: 1.55;
      }

      .status {
        display: grid;
        gap: 10px;
        min-width: 250px;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: var(--shadow);
      }

      .meter {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .meter div {
        padding: 8px;
        border-radius: 6px;
        text-align: center;
        font-weight: 800;
        font-size: 0.9rem;
      }

      .meter .yes {
        color: var(--yes);
        background: var(--yes-bg);
      }

      .meter .maybe {
        color: var(--maybe);
        background: var(--maybe-bg);
      }

      .meter .no {
        color: var(--no);
        background: var(--no-bg);
      }

      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 18px clamp(18px, 4vw, 56px) 56px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }

      .card {
        position: relative;
        overflow: hidden;
        min-height: 330px;
        padding: 20px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 10px 26px rgba(31, 41, 55, 0.08);
      }

      .card[data-rating="yes"] {
        border-color: rgba(23, 114, 69, 0.5);
        background: linear-gradient(135deg, rgba(222, 247, 232, 0.72), rgba(255, 255, 255, 0.92));
      }

      .card[data-rating="maybe"] {
        border-color: rgba(154, 91, 0, 0.45);
        background: linear-gradient(135deg, rgba(255, 240, 201, 0.8), rgba(255, 255, 255, 0.94));
      }

      .card[data-rating="no"] {
        opacity: 0.72;
        border-color: rgba(161, 52, 52, 0.35);
        background: linear-gradient(135deg, rgba(255, 225, 222, 0.58), rgba(255, 255, 255, 0.94));
      }

      .art {
        width: 80px;
        height: 80px;
        border: 1px solid var(--line);
        border-radius: 8px;
        display: grid;
        place-items: center;
        background:
          linear-gradient(135deg, rgba(35, 87, 216, 0.1), rgba(255, 214, 102, 0.24)),
          #ffffff;
      }

      .top {
        display: flex;
        gap: 16px;
        align-items: center;
      }

      .title {
        margin: 0;
        font-size: clamp(1.25rem, 2vw, 1.7rem);
        line-height: 1.12;
      }

      .why {
        margin: 16px 0 0;
        color: var(--muted);
        line-height: 1.48;
      }

      .controls {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      button {
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #ffffff;
        color: var(--ink);
        font: inherit;
        font-weight: 850;
        cursor: pointer;
      }

      button:hover {
        border-color: var(--blue);
      }

      button[data-rating="yes"].active {
        color: var(--yes);
        background: var(--yes-bg);
        border-color: rgba(23, 114, 69, 0.55);
      }

      button[data-rating="maybe"].active {
        color: var(--maybe);
        background: var(--maybe-bg);
        border-color: rgba(154, 91, 0, 0.5);
      }

      button[data-rating="no"].active {
        color: var(--no);
        background: var(--no-bg);
        border-color: rgba(161, 52, 52, 0.45);
      }

      textarea {
        width: 100%;
        min-height: 70px;
        resize: vertical;
        margin-top: 12px;
        padding: 11px 12px;
        border: 1px solid var(--line);
        border-radius: 7px;
        font: inherit;
        background: rgba(255, 255, 255, 0.82);
      }

      .save {
        margin-top: 9px;
        width: 100%;
      }

      footer {
        max-width: 1180px;
        margin: 0 auto;
        padding: 0 clamp(18px, 4vw, 56px) 48px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      svg {
        width: 48px;
        height: 48px;
      }

      @media (max-width: 820px) {
        .hero,
        .grid {
          grid-template-columns: 1fr;
        }

        .status {
          min-width: 0;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="hero">
        <div>
          <h1>Naming Word Rater</h1>
          <p class="subhead">
            Mark each word as no, maybe, or yes. Every click writes to
            <strong>tools/naming-rater/naming-ratings.md</strong> and keeps a JSON backup beside it.
          </p>
        </div>
        <aside class="status" aria-live="polite">
          <strong>Current ratings</strong>
          <div class="meter">
            <div class="yes"><span id="yesCount">0</span> yes</div>
            <div class="maybe"><span id="maybeCount">0</span> maybe</div>
            <div class="no"><span id="noCount">0</span> no</div>
          </div>
          <span id="saveStatus">Ready</span>
        </aside>
      </div>
    </header>

    <main>
      <section id="themes" class="grid"></section>
    </main>

    <footer>
      This is local scratch space for word-by-word naming only. It is not the product landing page.
    </footer>

    <template id="cardTemplate">
      <article class="card">
        <div class="top">
          <div class="art"></div>
          <h2 class="title"></h2>
        </div>
        <p class="why"></p>
        <div class="controls">
          <button type="button" data-rating="no">No</button>
          <button type="button" data-rating="maybe">Maybe</button>
          <button type="button" data-rating="yes">Yes</button>
        </div>
        <textarea placeholder="Optional notes, favorite words, or objections"></textarea>
        <button class="save" type="button">Save notes</button>
      </article>
    </template>

    <script>
      const art = {
        vault: '<svg viewBox="0 0 64 64" fill="none" aria-hidden="true"><rect x="9" y="19" width="46" height="35" rx="6" stroke="#18202b" stroke-width="4"/><path d="M21 19v-5a11 11 0 0 1 22 0v5" stroke="#2357d8" stroke-width="4"/><circle cx="32" cy="37" r="8" stroke="#9a5b00" stroke-width="4"/><path d="M32 29v16M24 37h16" stroke="#9a5b00" stroke-width="4"/></svg>',
        arrow: '<svg viewBox="0 0 64 64" fill="none" aria-hidden="true"><path d="M12 47h40M18 39l14-14 9 9 13-17" stroke="#18202b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><path d="M44 17h10v10" stroke="#2357d8" stroke-width="4" stroke-linecap="round"/></svg>',
        coin: '<svg viewBox="0 0 64 64" fill="none" aria-hidden="true"><circle cx="32" cy="32" r="21" fill="#fff0c9" stroke="#9a5b00" stroke-width="4"/><path d="M38 23c-9-4-18 5-9 10 11 5 4 14-7 9M32 17v30" stroke="#9a5b00" stroke-width="4" stroke-linecap="round"/></svg>',
        scoreboard: '<svg viewBox="0 0 64 64" fill="none" aria-hidden="true"><rect x="10" y="14" width="44" height="34" rx="5" stroke="#18202b" stroke-width="4"/><path d="M24 48v8M40 48v8M20 26h8M36 26h8M20 38h8M36 38h8" stroke="#2357d8" stroke-width="4" stroke-linecap="round"/></svg>',
        net: '<svg viewBox="0 0 64 64" fill="none" aria-hidden="true"><circle cx="27" cy="27" r="15" stroke="#2357d8" stroke-width="4"/><path d="M38 38l14 14M15 27h24M27 15v24" stroke="#18202b" stroke-width="4" stroke-linecap="round"/></svg>',
        wave: '<svg viewBox="0 0 64 64" fill="none" aria-hidden="true"><path d="M8 41c7-17 19 17 28 0s15-6 20 0" stroke="#2357d8" stroke-width="5" stroke-linecap="round"/><path d="M8 29c7-17 19 17 28 0s15-6 20 0" stroke="#9a5b00" stroke-width="4" stroke-linecap="round"/></svg>',
        spark: '<svg viewBox="0 0 64 64" fill="none" aria-hidden="true"><path d="M32 7l6 18 19 7-19 7-6 18-6-18-19-7 19-7 6-18z" fill="#fff0c9" stroke="#9a5b00" stroke-width="4" stroke-linejoin="round"/></svg>',
        market: '<svg viewBox="0 0 64 64" fill="none" aria-hidden="true"><path d="M12 25h40l-4-13H16l-4 13z" stroke="#18202b" stroke-width="4" stroke-linejoin="round"/><path d="M16 25v27h32V25M24 52V38h16v14" stroke="#2357d8" stroke-width="4" stroke-linejoin="round"/></svg>',
        people: '<svg viewBox="0 0 64 64" fill="none" aria-hidden="true"><circle cx="22" cy="24" r="8" stroke="#18202b" stroke-width="4"/><circle cx="43" cy="24" r="8" stroke="#2357d8" stroke-width="4"/><path d="M8 52c3-10 10-15 18-15s15 5 18 15M32 50c4-8 10-12 18-12 4 0 7 1 10 3" stroke="#18202b" stroke-width="4" stroke-linecap="round"/></svg>',
        wand: '<svg viewBox="0 0 64 64" fill="none" aria-hidden="true"><path d="M17 49l30-30M39 12l3 7 7 3-7 3-3 7-3-7-7-3 7-3 3-7zM18 13l2 4 4 2-4 2-2 4-2-4-4-2 4-2 2-4z" stroke="#9a5b00" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/></svg>',
      };

      let state = {};
      let themes = [];

      async function load() {
        const response = await fetch("/api/words");
        const data = await response.json();
        themes = data.themes;
        state = data.state || {};
        render();
      }

      function render() {
        const container = document.querySelector("#themes");
        const template = document.querySelector("#cardTemplate");
        container.innerHTML = "";

        for (const theme of themes) {
          const entry = state[theme.id] || {};
          const node = template.content.firstElementChild.cloneNode(true);
          node.dataset.id = theme.id;
          node.dataset.rating = entry.rating || "unrated";
          node.querySelector(".art").innerHTML = art[theme.image] || "";
          node.querySelector(".title").textContent = theme.title;
          node.querySelector(".why").textContent = `${theme.group}: ${theme.why}`;
          for (const button of node.querySelectorAll(".controls button")) {
            button.classList.toggle("active", button.dataset.rating === entry.rating);
            button.addEventListener("click", () => rate(theme.id, button.dataset.rating));
          }
          const notes = node.querySelector("textarea");
          notes.value = entry.notes || "";
          node.querySelector(".save").addEventListener("click", () => saveNotes(theme.id, notes.value));
          container.append(node);
        }

        updateCounts();
      }

      function updateCounts() {
        const counts = { yes: 0, maybe: 0, no: 0 };
        for (const entry of Object.values(state)) {
          if (counts[entry.rating] !== undefined) counts[entry.rating] += 1;
        }
        document.querySelector("#yesCount").textContent = counts.yes;
        document.querySelector("#maybeCount").textContent = counts.maybe;
        document.querySelector("#noCount").textContent = counts.no;
      }

      async function rate(id, rating) {
        setStatus("Saving...");
        const response = await fetch("/api/rate", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ id, rating }),
        });
        const data = await response.json();
        state = data.state || state;
        render();
        setStatus("Saved to Markdown");
      }

      async function saveNotes(id, notes) {
        setStatus("Saving notes...");
        const response = await fetch("/api/notes", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ id, notes }),
        });
        const data = await response.json();
        state = data.state || state;
        render();
        setStatus("Notes saved");
      }

      function setStatus(message) {
        document.querySelector("#saveStatus").textContent = message;
      }

      load();
    </script>
  </body>
</html>
